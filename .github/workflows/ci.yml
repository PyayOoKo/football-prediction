# ═══════════════════════════════════════════════════════════════════════════════
#  Football Prediction — Enterprise CI/CD Pipeline
#  Runs on every push to main/develop and every PR to main.
#
#  Pipeline stages (parallel where possible):
#   1. Security Scan    — pip-audit, bandit, SAST
#   2. Lint & Format    — ruff, black, mypy, import check
#   3. Test Matrix      — pytest with coverage enforcement, DB migration test
#   4. Docker Build     — multi-stage build with provenance
#   5. Status Gate      — merge gate combining all required checks
# ═══════════════════════════════════════════════════════════════════════════════

name: CI/CD

on:
  push:
    branches: [master, main, develop]
    tags-ignore: ["**"]
  pull_request:
    branches: [master, main]
    types: [opened, synchronize, reopened]

# ── Cancel stale runs for the same branch/PR ──────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Environment variables ──────────────────────────────
env:
  PYTHON_VERSION: "3.12"
  PYTHONUNBUFFERED: "1"
  PIP_CACHE_DIR: ~/.cache/pip
  DOCKER_IMAGE: football-prediction
  REGISTRY: ghcr.io/${{ github.repository_owner }}

defaults:
  run:
    shell: bash

jobs:
  # ══════════════════════════════════════════════════════════════════════════════
  #  1.  SECURITY SCAN
  #      Fastest job — runs first to fail early on vulnerabilities.
  # ══════════════════════════════════════════════════════════════════════════════
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,api]"

      - name: Scan Python dependencies (pip-audit)
        id: pip_audit
        continue-on-error: true
        run: |
          echo "::group::pip-audit — vulnerability scan"
          pip-audit \
            --strict \
            --desc on \
            --format markdown \
            --output pip-audit-report.md \
            || true
          echo "::endgroup::"
          echo "report=pip-audit-report.md" >> $GITHUB_OUTPUT

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: pip-audit-report.md
          retention-days: 30

      - name: Scan source code (Bandit)
        continue-on-error: true
        run: |
          echo "::group::Bandit — SAST scan"
          bandit \
            -r src/ \
            --severity-level high \
            --confidence-level high \
            --format sarif \
            --output bandit-results.sarif \
            || true
          echo "::endgroup::"

      - name: Upload Bandit results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Check for secrets (truffleHog)
        continue-on-error: true
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --results=verified,unknown

  # ══════════════════════════════════════════════════════════════════════════════
  #  2.  LINT & FORMAT
  #      Runs independently from other jobs.
  # ══════════════════════════════════════════════════════════════════════════════
  lint:
    name: 📋 Lint & Format
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,api]"

      - name: Check formatting (Black)
        run: |
          echo "::group::Black — line-length=88, target=py312"
          black --check --diff --verbose src/ tests/
          echo "::endgroup::"

      - name: Lint (Ruff)
        run: |
          echo "::group::Ruff"
          ruff check src/ tests/
          echo "::endgroup::"
        continue-on-error: false

      - name: Type check (MyPy)
        run: |
          echo "::group::MyPy — strict mode"
          mypy src/ tests/ --show-error-codes
          echo "::endgroup::"

      - name: Validate all modules import
        run: |
          echo "::group::Import validation"
          python << 'PYEOF'
          import importlib, sys
          from pathlib import Path
          errors = []
          count = 0
          for py_file in sorted(Path('src').rglob('*.py')):
              if py_file.name == '__init__.py':
                  continue
              rel = py_file.relative_to('.')
              if rel.parts[0] != 'src':
                  continue
              mod_name = '.'.join(rel.with_suffix('').parts)
              try:
                  importlib.import_module(mod_name)
                  count += 1
              except Exception as e:
                  errors.append((mod_name, str(e)))
          if errors:
              print(f'❌ {len(errors)} module(s) failed:')
              for mod, err in errors:
                  print(f'    {mod}: {err}')
              sys.exit(1)
          print(f'✅ All {count} modules imported.')
          PYEOF
          echo "::endgroup::"

  # ══════════════════════════════════════════════════════════════════════════════
  #  3.  TEST MATRIX
  #      Runs pytest with coverage, database migration test, slow/fast split.
  # ══════════════════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    needs: lint
    timeout-minutes: 20

    strategy:
      matrix:
        python-version: ["3.12"]
        test-suite: ["fast", "slow"]
      fail-fast: false

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: football_prediction_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,api]"

      - name: Run database migrations (Alembic)
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/football_prediction_test
        run: |
          echo "::group::Alembic migrations"
          alembic upgrade head
          echo "Current head:"
          alembic current
          echo "::endgroup::"

      - name: Run ${{ matrix.test-suite }} tests with coverage
        id: test
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/football_prediction_test
          APP_ENV: test
          LOG_LEVEL: WARNING
        run: |
          MARKER="${{ matrix.test-suite == 'slow' && '' || '-m \"not slow\"' }}"
          pytest tests/ \
            -v \
            --tb=short \
            --strict-config \
            $MARKER \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -n auto \
            --dist loadscope

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.python-version }}-${{ matrix.test-suite }}
          path: coverage.xml
          retention-days: 30

      - name: Check coverage threshold
        if: always()
        run: |
          # Parse coverage XML for line-rate
          RATE=$(grep -o 'line-rate="[0-9.]*"' coverage.xml | head -1 | grep -o '[0-9.]*')
          PCT=$(echo "$RATE * 100" | bc -l | xargs printf "%.1f")
          echo "✅ Line coverage: $PCT%"
          if (( $(echo "$PCT < 75" | bc -l) )); then
            echo "❌ Coverage $PCT% is below 75% threshold"
            exit 1
          fi

  # ══════════════════════════════════════════════════════════════════════════════
  #  4.  DOCKER BUILD
  #      Builds and scans the production image.
  # ══════════════════════════════════════════════════════════════════════════════
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-22.04
    needs: test
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and cache Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
          outputs: type=image

      - name: Scan image for vulnerabilities (Trivy)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ══════════════════════════════════════════════════════════════════════════════
  #  5.  STATUS GATE (PR MERGE GATE)
  # ══════════════════════════════════════════════════════════════════════════════
  status:
    name: ✅ Status Gate
    runs-on: ubuntu-22.04
    needs: [security, lint, test, docker]
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: Check all jobs passed
        run: |
          FAILED=''
          for job in security lint test docker; do
            RESULT=$(echo '${{ toJSON(needs) }}' | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('$job',{}).get('result','failure'))")
            if [ "$RESULT" != "success" ]; then
              FAILED="$FAILED $job($RESULT)"
            fi
          done

          if [ -n "$FAILED" ]; then
            echo "❌ Failed jobs:$FAILED"
            exit 1
          fi
          echo "✅ All enterprise CI checks passed."
          echo "## All CI checks passed" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════════════════════
  #  6.  BUILD BADGE (on main branch)
  # ══════════════════════════════════════════════════════════════════════════════
  badge:
    name: 🏅 Build Badge
    runs-on: ubuntu-22.04
    needs: [status]
    if: success() && github.ref == 'refs/heads/main'
    timeout-minutes: 5

    steps:
      - name: Generate dynamic badge
        uses: emibcn/badge-action@v2.0.2
        with:
          label: build
          status: passing
          color: green
          path: .github/badges/build.svg

      - name: Upload badge
        uses: actions/upload-artifact@v7
        with:
          name: build-badge
          path: .github/badges/build.svg
          retention-days: 90

  # ══════════════════════════════════════════════════════════════════════════════
  #  7.  NOTIFICATION
  #      Sends workflow summary to Slack/email on failure.
  # ══════════════════════════════════════════════════════════════════════════════
  notify:
    name: 📬 Notification
    runs-on: ubuntu-22.04
    needs: [security, lint, test, docker]
    if: failure() && github.ref == 'refs/heads/main'
    timeout-minutes: 5

    steps:
      - name: Send Slack notification
        uses: rtCamp/action-slack-notify@v2
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: ci-failures
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: "🚨 CI Pipeline Failed"
          SLACK_MESSAGE: |
            *Repository:* ${{ github.repository }}
            *Branch:* ${{ github.ref }}
            *Commit:* ${{ github.sha }}
            *Author:* ${{ github.actor }}
            *URL:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_FOOTER: "Football Prediction CI"

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        if: ${{ secrets.CI_EMAIL != '' }}
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚨 CI Failure — ${{ github.repository }} (${{ github.ref }})"
          to: ${{ secrets.CI_EMAIL }}
          from: GitHub Actions
          body: |
            CI pipeline failed for ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
