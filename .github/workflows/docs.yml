# ═══════════════════════════════════════════════════════════════════════════════
#  Documentation — Build and deploy to GitHub Pages
#  Triggered by pushes to main and on-demand via workflow_dispatch.
# ═══════════════════════════════════════════════════════════════════════════════

name: Documentation

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - "src/**/*.py"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Grant GITHUB_TOKEN permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress docs builds for the same branch
concurrency:
  group: pages
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ══════════════════════════════════════════════════════════════════════════════
  #  1.  BUILD DOCUMENTATION
  # ══════════════════════════════════════════════════════════════════════════════
  build:
    name: 📖 Build Docs
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install documentation tools
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocstrings[python] mkdocs-include-markdown-plugin

      - name: Build MkDocs site
        run: |
          mkdocs build --site-dir _site --strict

      - name: Generate API docs from docstrings
        run: |
          python -c "
          import inspect, pkgutil, importlib, pathlib, json

          modules = []
          for importer, modname, ispkg in pkgutil.walk_packages([str(pathlib.Path('src'))], prefix='src.'):
              if not ispkg:
                  modules.append(modname)

          # Save module list for mkdocs
          pathlib.Path('_site/modules.json').write_text(json.dumps(modules, indent=2))
          print(f'Found {len(modules)} modules for API docs')
          "

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  # ══════════════════════════════════════════════════════════════════════════════
  #  2.  DEPLOY TO GITHUB PAGES
  # ══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy Docs
    runs-on: ubuntu-22.04
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
